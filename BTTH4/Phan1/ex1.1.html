<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điểm Sinh Viên - Bài 1.1</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .stats { margin-top: 20px; font-weight: bold; }
        .low-score { background-color: yellow; } /* Tô vàng cho điểm < 5.0 */
    </style>
</head>
<body>

    <h2>Quản lý điểm sinh viên</h2>

    <div class="form-group">
        <input type="text" id="name" placeholder="Họ và tên">
        <input type="number" id="score" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentBody">
            </tbody>
    </table>

    <div class="stats">
        Tổng số sinh viên: <span id="totalCount">0</span> | 
        Điểm trung bình: <span id="avgScore">0.0</span>
    </div>

    <script src="ex1.1.js"></script>
</body>
</html>
