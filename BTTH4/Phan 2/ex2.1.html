<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Đăng Ký - Bài 2.1</title>
    <link rel="stylesheet" href="ex2.1.css">
</head>
<body>

    <form id="registerForm">
        <h2>Đăng Ký Tài Khoản</h2>
        
        <div class="form-group">
            <label for="fullname">Họ và tên</label>
            <input type="text" id="fullname">
            <span class="error" id="fullnameError"></span>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email">
            <span class="error" id="emailError"></span>
        </div>

        <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <input type="text" id="phone">
            <span class="error" id="phoneError"></span>
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password">
            <span class="error" id="passwordError"></span>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword">
            <span class="error" id="confirmPasswordError"></span>
        </div>

        <div class="form-group">
            <label>Giới tính</label>
            <label><input type="radio" name="gender" value="Nam"> Nam</label>
            <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
            <span class="error" id="genderError"></span>
        </div>

        <div class="form-group">
            <label><input type="checkbox" id="terms"> Tôi đồng ý với các điều khoản</label>
            <span class="error" id="termsError"></span>
        </div>

        <button type="submit">Đăng ký</button>
    </form>

    <div id="successMessage" class="success-msg"></div>

    <script src="ex2.1.js"></script>
</body>
</html>
